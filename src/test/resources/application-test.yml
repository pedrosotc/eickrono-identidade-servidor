spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  main:
    allow-bean-definition-overriding: true

logging:
  level:
    root: INFO
    com.eickrono.api.identidade: DEBUG

identidade:
  atestacao:
    app:
      numero-projeto-nuvem-android: "123456789"
      permitir-validacao-local-sem-provedor-oficial: true
  dispositivo:
    onboarding:
      sms-habilitado: true
      sms-fornecedor: teste
    offline:
      permitido: true
      tempo-maximo-minutos: 720
      exige-reconciliacao: true
      bloquear-quando-token-revogado: true
      bloquear-quando-token-expirado: true
      bloquear-quando-dispositivo-sem-confianca: true
    token:
      segredo-hmac: test-device-token-secret
      tamanho-bytes: 16
      validade-horas: 48
    codigo:
      segredo-hmac: test-code-secret
      tamanho: 6
      tentativas-maximas: 5
      reenvios-maximos: 3
      expiracao-horas: 9
