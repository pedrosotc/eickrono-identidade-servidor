spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://rds-identidade.eickrono.internal:5432/eickrono_identidade
    username: ${IDENTIDADE_DB_USUARIO}
    password: ${IDENTIDADE_DB_SENHA}
  flyway:
    schemas: identidade
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://oidc.eickrono.com/realms/eickrono
          jwk-set-uri: https://oidc.eickrono.com/realms/eickrono/protocol/openid-connect/certs

seguranca:
  mtls:
    habilitado: true
    keystore-arquivo: file:/app/seguranca/mtls/servidor-prod.p12
    keystore-senha: ${IDENTIDADE_MTLS_KEY_PASSWORD}
    truststore-arquivo: file:/app/seguranca/mtls/truststore-prod.p12
    truststore-senha: ${IDENTIDADE_MTLS_TRUST_PASSWORD}
  cors:
    origens-permitidas:
      - https://app.eickrono.com.br
      - https://bff.eickrono.com.br

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  server:
    port: 9091
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when_authorized

documentacao:
  swagger:
    usuario: swagger
    senha: ${SWAGGER_HML_SENHA:trocar}
    ips-permitidos:
      - 10.0.0.1

logging:
  level:
    root: WARN
    com.eickrono.api.identidade: INFO

identidade:
  seguranca:
    app:
      modo-observacao: false
  atestacao:
    app:
      permitir-validacao-local-sem-provedor-oficial: false
      google:
        habilitado: true
      apple:
        habilitado: true
  cadastro:
    email:
      fornecedor: ${IDENTIDADE_CADASTRO_EMAIL_FORNECEDOR:smtp}
    interna:
      keycloak:
        url-base: ${IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_URL_BASE}
        realm: ${IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_REALM:eickrono}
        client-id: ${IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_CLIENT_ID:admin-cli}
        client-secret: ${IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_CLIENT_SECRET:}
        admin-username: ${IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_ADMIN_USERNAME}
        admin-password: ${IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_ADMIN_PASSWORD}
  sessao:
    interna:
      keycloak:
        url-base: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_URL_BASE}
        realm: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_REALM:eickrono}
        client-id: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_CLIENT_ID:app-flutter-prod}
        client-secret: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_CLIENT_SECRET:}
  dispositivo:
    token:
      segredo-hmac: ${IDENTIDADE_DEVICE_TOKEN_SECRET}
    codigo:
      segredo-hmac: ${IDENTIDADE_CODIGO_TOKEN_SECRET}
