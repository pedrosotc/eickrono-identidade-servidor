spring:
  application:
    name: api-identidade-eickrono
  main:
    banner-mode: off
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true
      hibernate.jdbc.time_zone: UTC
  cache:
    type: caffeine
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${SPRING_MAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
      mail.smtp.connectiontimeout: ${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:5000}
      mail.smtp.timeout: ${SPRING_MAIL_SMTP_TIMEOUT:5000}
      mail.smtp.writetimeout: ${SPRING_MAIL_SMTP_WRITE_TIMEOUT:5000}
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8081

documentacao:
  swagger:
    usuario: swagger
    senha: swagger
    ips-permitidos:
      - 127.0.0.1

seguranca:
  cors:
    origens-permitidas:
      - http://localhost:3000
  mtls:
    habilitado: false

fapi:
  seguranca:
    audiencia-esperada: api-identidade-eickrono
    tolerancia-clock-skew-segundos: 60

identidade:
  seguranca:
    app:
      habilitado: true
      modo-observacao: true
      score-maximo-permitido: 69
      aplicacoes-permitidas:
        - eickrono-thimisu-app
  atestacao:
    app:
      duracao-desafio: PT5M
      numero-projeto-nuvem-android: ${IDENTIDADE_ATESTACAO_APP_ANDROID_NUMERO_PROJETO_NUVEM:}
      permitir-validacao-local-sem-provedor-oficial: false
      google:
        habilitado: false
        package-name: ${IDENTIDADE_ATESTACAO_APP_GOOGLE_PACKAGE_NAME:}
        service-account-json-arquivo: ${IDENTIDADE_ATESTACAO_APP_GOOGLE_SERVICE_ACCOUNT_JSON_ARQUIVO:}
        tolerancia-tempo-token: PT2M
        exigir-play-recognized: true
        exigir-device-integrity: true
        exigir-licenciado: true
      apple:
        habilitado: false
        team-identifier: ${IDENTIDADE_ATESTACAO_APP_APPLE_TEAM_IDENTIFIER:}
        bundle-identifier: ${IDENTIDADE_ATESTACAO_APP_APPLE_BUNDLE_IDENTIFIER:}
        root-ca-arquivo: ${IDENTIDADE_ATESTACAO_APP_APPLE_ROOT_CA_ARQUIVO:classpath:certificados/Apple_App_Attestation_Root_CA.pem}
  cadastro:
    email:
      fornecedor: ${IDENTIDADE_CADASTRO_EMAIL_FORNECEDOR:log}
      remetente: ${IDENTIDADE_CADASTRO_EMAIL_REMETENTE:no-reply@eickrono.local}
      responder-para: ${IDENTIDADE_CADASTRO_EMAIL_RESPONDER_PARA:}
      assunto: ${IDENTIDADE_CADASTRO_EMAIL_ASSUNTO:Codigo de confirmacao do cadastro}
      assunto-recuperacao-senha: ${IDENTIDADE_CADASTRO_EMAIL_ASSUNTO_RECUPERACAO_SENHA:Codigo de recuperacao de senha}
      nome-aplicacao: ${IDENTIDADE_CADASTRO_EMAIL_NOME_APLICACAO:Eickrono}
    interna:
      keycloak:
        url-base: ${IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_URL_BASE:http://localhost:8080}
        admin-realm: ${IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_ADMIN_REALM:master}
        realm: ${IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_REALM:eickrono}
        client-id: ${IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_CLIENT_ID:admin-cli}
        client-secret: ${IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_CLIENT_SECRET:}
        admin-username: ${IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_ADMIN_USERNAME:admin}
        admin-password: ${IDENTIDADE_CADASTRO_INTERNO_KEYCLOAK_ADMIN_PASSWORD:admin}
        password-pepper: ${EICKRONO_PASSWORD_PEPPER:}
        timeout: PT5S
  sessao:
    interna:
      keycloak:
        url-base: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_URL_BASE:http://localhost:8080}
        realm: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_REALM:eickrono}
        client-id: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_CLIENT_ID:app-flutter-local}
        client-secret: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_CLIENT_SECRET:}
        scope: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_SCOPE:openid identidade:ler vinculos:ler vinculos:escrever offline_access}
        token-exchange-client-id: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_TOKEN_EXCHANGE_CLIENT_ID:}
        token-exchange-client-secret: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_TOKEN_EXCHANGE_CLIENT_SECRET:}
        token-exchange-audience: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_TOKEN_EXCHANGE_AUDIENCE:}
        token-exchange-scope: ${IDENTIDADE_SESSAO_INTERNA_KEYCLOAK_TOKEN_EXCHANGE_SCOPE:}
        password-pepper: ${EICKRONO_PASSWORD_PEPPER:}
        timeout: PT5S
  dispositivo:
    onboarding:
      sms-habilitado: false
      sms-fornecedor: log
    offline:
      permitido: true
      tempo-maximo-minutos: 1440
      exige-reconciliacao: true
      bloquear-quando-token-revogado: true
      bloquear-quando-token-expirado: true
      bloquear-quando-dispositivo-sem-confianca: true
    token:
      segredo-hmac: ${IDENTIDADE_DEVICE_TOKEN_SECRET:local-device-token-secret}
      tamanho-bytes: 32
      validade-horas: 720
    codigo:
      segredo-hmac: ${IDENTIDADE_CODIGO_TOKEN_SECRET:local-codigo-secret}
      tamanho: 6
      tentativas-maximas: 5
      reenvios-maximos: 3
      expiracao-horas: 9

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: api-identidade-eickrono

logging:
  level:
    root: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{traceId:-}/%X{spanId:-}] %logger{36} - %msg%n"

integracao:
  interna:
    segredo: ${EICKRONO_INTERNAL_SECRET:local-internal-secret}
    clientes-permitidos:
      - ${INTEGRACAO_INTERNA_CLIENTE_THIMISU:thimisu-backend}
      - identidade-servidor
      - ${INTEGRACAO_INTERNA_CLIENTE_AUTORIZACAO:servidor-autorizacao}
      - ${INTEGRACAO_INTERNA_CLIENTE_AUTORIZACAO_INTERNO:servidor-autorizacao-interno}
  perfil:
    url-base: ${INTEGRACAO_PERFIL_URL_BASE:http://localhost:8082}
    disponibilidade-url-base: ${INTEGRACAO_PERFIL_DISPONIBILIDADE_URL_BASE:http://localhost:8081}
    timeout: ${INTEGRACAO_PERFIL_TIMEOUT:PT5S}
    jwt-interno:
      url-base: ${INTEGRACAO_PERFIL_JWT_INTERNO_URL_BASE:http://localhost:8080}
      realm: ${INTEGRACAO_PERFIL_JWT_INTERNO_REALM:eickrono}
      client-id: ${INTEGRACAO_PERFIL_JWT_INTERNO_CLIENT_ID:autenticacao-servidor}
      client-secret: ${INTEGRACAO_PERFIL_JWT_INTERNO_CLIENT_SECRET:CHANGE_ME}
      timeout: ${INTEGRACAO_PERFIL_JWT_INTERNO_TIMEOUT:PT5S}
